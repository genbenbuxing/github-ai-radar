name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Compile
        run: python -m compileall src tests

      - name: Test
        run: python -m pytest -q

      - name: CLI smoke
        run: |
          github-ai-radar --version
          github-ai-radar --root "$RUNNER_TEMP/radar" init
          github-ai-radar --root "$RUNNER_TEMP/radar" status
          github-ai-radar --root "$RUNNER_TEMP/radar" doctor
